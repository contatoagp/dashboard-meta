document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

var(--text);\n    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;\n    -webkit-font-smoothing: antialiased;\n    min-height: 100vh;\n  }\n\n  body {\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    padding: 40px 24px 64px;\n  }\n\n  .shell {\n    width: 100%;\n    max-width: 860px;\n    display: flex;\n    flex-direction: column;\n    gap: 36px;\n  }\n\n  /* ---------- Top bar ---------- */\n  .topbar {\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n  }\n\n  .brand {\n    display: flex;\n    align-items: center;\n    gap: 16px;\n  }\n  .brand .logo {\n    height: 38px;\n    width: auto;\n    display: block;\n    flex: 0 0 auto;\n  }\n  .brand .sub {\n    font-size: 11px;\n    font-weight: 500;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    color: var(--text-3);\n    padding-left: 16px;\n    border-left: 1px solid var(--border);\n    align-self: center;\n  }\n  @media (max-width: 560px) {\n    .brand .sub { display: none; }\n  }\n\n  .month-badge {\n    display: inline-flex;\n    align-items: center;\n    gap: 8px;\n    padding: 8px 16px;\n    background: var(--surface);\n    border: 1px solid var(--border);\n    border-radius: 999px;\n    font-size: 13px;\n    font-weight: 500;\n    color: var(--text-2);\n  }\n  .month-badge .pip {\n    width: 6px; height: 6px;\n    border-radius: 50%;\n    background: var(--green);\n  }\n\n  /* ---------- Gauge card ---------- */\n  .gauge-card {\n    background: var(--surface);\n    border: 1px solid var(--border);\n    border-radius: 20px;\n    padding: 48px 32px 40px;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    box-shadow: 0 1px 0 rgba(255,255,255,0.03) inset, 0 24px 48px -24px rgba(0,0,0,0.5);\n  }\n\n  .gauge-wrap {\n    position: relative;\n    width: 100%;\n    max-width: 420px;\n  }\n  .gauge-wrap svg { display: block; width: 100%; height: auto; }\n\n  .gauge-center {\n    position: absolute;\n    left: 50%;\n    bottom: 6%;\n    transform: translateX(-50%);\n    text-align: center;\n    width: 80%;\n  }\n  .gauge-pct {\n    font-size: 76px;\n    font-weight: 800;\n    line-height: 1;\n    letter-spacing: -0.02em;\n    color: var(--text);\n    font-variant-numeric: tabular-nums;\n  }\n  .gauge-pct.over { color: var(--green); }\n  .gauge-values {\n    margin-top: 12px;\n    font-size: 15px;\n    font-weight: 500;\n    color: var(--text-2);\n    font-variant-numeric: tabular-nums;\n  }\n\n  /* status line below gauge */\n  .status {\n    margin-top: 28px;\n    min-height: 30px;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n  }\n  .status .remaining {\n    font-size: 16px;\n    font-weight: 500;\n    color: var(--text-2);\n    font-variant-numeric: tabular-nums;\n  }\n  .status .remaining b { color: var(--text); font-weight: 700; }\n\n  .seal {\n    display: none;\n    align-items: center;\n    gap: 10px;\n    padding: 10px 20px;\n    background: rgba(71,173,132,0.12);\n    border: 1px solid rgba(71,173,132,0.35);\n    border-radius: 999px;\n    color: var(--green);\n    font-size: 15px;\n    font-weight: 700;\n    letter-spacing: 0.01em;\n  }\n  .seal .check {\n    width: 20px; height: 20px;\n    border-radius: 50%;\n    background: var(--green);\n    color: var(--bg);\n    display: inline-flex;\n    align-items: center;\n    justify-content: center;\n    font-size: 12px;\n    font-weight: 800;\n  }\n  body.goal-met .status .remaining { display: none; }\n  body.goal-met .seal { display: inline-flex; }\n\n  /* projection status line below the remaining/seal */\n  .proj-status {\n    margin-top: 14px;\n    min-height: 22px;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    gap: 8px;\n    font-size: 13px;\n    font-weight: 500;\n    color: var(--text-2);\n    font-variant-numeric: tabular-nums;\n  }\n  .proj-status .swatch {\n    width: 9px; height: 9px;\n    border-radius: 2px;\n    background: var(--text-2);\n  }\n  .proj-status b { font-weight: 700; }\n  .proj-status.good { color: var(--green); }\n  .proj-status.good .swatch { background: var(--green); }\n  .proj-status.bad { color: var(--alert); }\n  .proj-status.bad .swatch { background: var(--alert); }\n  .proj-status.hidden { display: none; }\n\n  /* ---------- Inputs ---------- */\n  .inputs {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 16px;\n  }\n  @media (max-width: 560px) {\n    .inputs { grid-template-columns: 1fr; }\n    .gauge-pct { font-size: 60px; }\n  }\n\n  .field {\n    background: var(--surface);\n    border: 1px solid var(--border);\n    border-radius: var(--radius);\n    padding: 16px 18px;\n    transition: background 0.15s ease, border-color 0.15s ease;\n  }\n  .field:focus-within {\n    background: var(--surface-2);\n    border-color: rgba(71,173,132,0.45);\n  }\n  .field label {\n    display: block;\n    font-size: 11px;\n    font-weight: 600;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--text-3);\n    margin-bottom: 8px;\n  }\n  .field .input-row {\n    display: flex;\n    align-items: baseline;\n    gap: 8px;\n  }\n  .field .prefix {\n    font-size: 22px;\n    font-weight: 600;\n    color: var(--text-2);\n  }\n  .field input {\n    flex: 1;\n    width: 100%;\n    background: transparent;\n    border: none;\n    outline: none;\n    color: var(--text);\n    font-family: inherit;\n    font-size: 26px;\n    font-weight: 700;\n    letter-spacing: -0.01em;\n    font-variant-numeric: tabular-nums;\n    min-width: 0;\n  }\n  .field input::placeholder { color: var(--text-3); font-weight: 600; }\n<\u002Fstyle>\n<\u002Fhead>\n\n<body>\n  <main class=\"shell\" data-screen-label=\"Dashboard Meta Prince\">\n\n    <header class=\"topbar\">\n      <div class=\"brand\">\n        <img class=\"logo\" src=\"88964f82-6b49-4cd6-97a1-4ae46554aee3\" alt=\"Prince\">\n        <span class=\"sub\">Acompanhamento de Meta<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"month-badge\"><span class=\"pip\"><\u002Fspan>Maio<\u002Fdiv>\n    <\u002Fheader>\n\n    <section class=\"gauge-card\">\n      <div class=\"gauge-wrap\">\n        <svg viewBox=\"0 0 400 230\" xmlns=\"http://www.w3.org/2000/svg\">\n          <path id=\"track\" d=\"M 40 210 A 160 160 0 0 1 360 210\" fill=\"none\" stroke=\"#1A323A\" stroke-width=\"26\" stroke-linecap=\"round\"><\u002Fpath>\n          <path id=\"progress\" d=\"M 40 210 A 160 160 0 0 1 360 210\" fill=\"none\" stroke=\"#47AD84\" stroke-width=\"26\" stroke-linecap=\"round\"><\u002Fpath>\n          <line id=\"projMarker\" x1=\"40\" y1=\"196\" x2=\"40\" y2=\"224\" stroke=\"#F2F0EB\" stroke-width=\"3\" stroke-linecap=\"round\" opacity=\"0\"><\u002Fline>\n        <\u002Fsvg>\n        <div class=\"gauge-center\">\n          <div class=\"gauge-pct\" id=\"pct\">0%<\u002Fdiv>\n          <div class=\"gauge-values\" id=\"values\">R$ 0 de R$ 0<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"status\">\n        <div class=\"remaining\" id=\"remaining\">Faltam <b>R$ 0<\u002Fb> para a meta<\u002Fdiv>\n        <div class=\"seal\"><span class=\"check\">✓<\u002Fspan>Meta batida<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"proj-status hidden\" id=\"projStatus\"><span class=\"swatch\"><\u002Fspan><span id=\"projText\"><\u002Fspan><\u002Fdiv>\n    <\u002Fsection>\n\n    <section class=\"inputs\">\n      <div class=\"field\">\n        <label for=\"vendas\">Vendas (R$)<\u002Flabel>\n        <div class=\"input-row\">\n          <span class=\"prefix\">R$<\u002Fspan>\n          <input id=\"vendas\" type=\"text\" inputmode=\"numeric\" value=\"72.000\" autocomplete=\"off\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"field\">\n        <label for=\"meta\">Meta (R$)<\u002Flabel>\n        <div class=\"input-row\">\n          <span class=\"prefix\">R$<\u002Fspan>\n          <input id=\"meta\" type=\"text\" inputmode=\"numeric\" value=\"100.000\" autocomplete=\"off\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"field\">\n        <label for=\"projecao\">Projeção (R$)<\u002Flabel>\n        <div class=\"input-row\">\n          <span class=\"prefix\">R$<\u002Fspan>\n          <input id=\"projecao\" type=\"text\" inputmode=\"numeric\" value=\"95.000\" autocomplete=\"off\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fmain>\n\n<script>\n(function () {\n  var vendasEl = document.getElementById('vendas');\n  var metaEl   = document.getElementById('meta');\n  var projEl   = document.getElementById('projecao');\n  var pctEl    = document.getElementById('pct');\n  var valuesEl = document.getElementById('values');\n  var remEl    = document.getElementById('remaining');\n  var progress = document.getElementById('progress');\n  var marker   = document.getElementById('projMarker');\n  var projStatus = document.getElementById('projStatus');\n  var projText = document.getElementById('projText');\n  var body     = document.body;\n\n  // Arc length of the semicircle (π * r), r = 160\n  var ARC = Math.PI * 160; // ≈ 502.65\n  progress.style.strokeDasharray = ARC;\n  progress.style.strokeDashoffset = ARC;\n  progress.style.transition = 'stroke-dashoffset 0.6s cubic-bezier(0.22,1,0.36,1), stroke 0.3s ease';\n  marker.style.transition = 'opacity 0.3s ease';\n\n  // Gauge geometry: center (200,210), radius 160, sweeps 180°→0°\n  var CX = 200, CY = 210, R = 160;\n  function markerAt(ratio) {\n    var r = Math.max(0, Math.min(1, ratio));\n    var ang = Math.PI * (1 - r);          // π at 0%, 0 at 100%\n    var ux = Math.cos(ang), uy = -Math.sin(ang);\n    var inner = R - 15, outer = R + 15;\n    marker.setAttribute('x1', (CX + ux * inner).toFixed(1));\n    marker.setAttribute('y1', (CY + uy * inner).toFixed(1));\n    marker.setAttribute('x2', (CX + ux * outer).toFixed(1));\n    marker.setAttribute('y2', (CY + uy * outer).toFixed(1));\n  }\n\n  var nf = new Intl.NumberFormat('pt-BR', { maximumFractionDigits: 0 });\n\n  // Parse \"72.000\" / \"72.000,50\" / \"72000\" -> number\n  function parseBR(str) {\n    if (!str) return 0;\n    str = String(str).replace(/[^0-9.,]/g, '');\n    if (str.indexOf(',') > -1) {\n      // comma is decimal sep -> drop thousand dots, swap comma to dot\n      str = str.replace(/\\./g, '').replace(',', '.');\n    } else {\n      // dots are thousand separators\n      str = str.replace(/\\./g, '');\n    }\n    var n = parseFloat(str);\n    return isNaN(n) ? 0 : n;\n  }\n\n  function fmt(n) { return nf.format(Math.round(n)); }\n\n  function render() {\n    var vendas = parseBR(vendasEl.value);\n    var meta   = parseBR(metaEl.value);\n\n    var ratio = meta > 0 ? vendas / meta : 0;\n    var pct = ratio * 100;\n    var capped = Math.max(0, Math.min(1, ratio)); // arc never overfills past 100%\n    var met = meta > 0 && vendas >= meta;\n\n    // arc fill\n    progress.style.strokeDashoffset = ARC * (1 - capped);\n    progress.style.stroke = met ? '#47AD84' : '#47AD84';\n\n    // percentage\n    pctEl.textContent = (meta > 0 ? Math.round(pct) : 0) + '%';\n    pctEl.classList.toggle('over', met);\n\n    // values\n    valuesEl.textContent = 'R$ ' + fmt(vendas) + ' de R$ ' + fmt(meta);\n\n    // remaining / seal\n    body.classList.toggle('goal-met', met);\n    if (!met) {\n      var faltam = Math.max(0, meta - vendas);\n      remEl.innerHTML = 'Faltam <b>R$ ' + fmt(faltam) + '<\u002Fb> para a meta';\n    }\n\n    // ---- projection ----\n    var proj = parseBR(projEl.value);\n    if (proj > 0 && meta > 0) {\n      var projRatio = proj / meta;\n      markerAt(projRatio);\n      marker.style.opacity = '0.9';\n      marker.setAttribute('stroke', proj >= meta ? '#47AD84' : '#E06B5C');\n\n      var projPct = Math.round(projRatio * 100);\n      projStatus.classList.remove('hidden');\n      if (proj >= meta) {\n        projStatus.className = 'proj-status good';\n        projText.innerHTML = 'Projeção: <b>R$ ' + fmt(proj) + '<\u002Fb> · ' + projPct + '% da meta — no caminho certo';\n      } else {\n        projStatus.className = 'proj-status bad';\n        var gap = meta - proj;\n        projText.innerHTML = 'Projeção: <b>R$ ' + fmt(proj) + '<\u002Fb> · ' + projPct + '% da meta — R$ ' + fmt(gap) + ' abaixo';\n      }\n    } else {\n      marker.style.opacity = '0';\n      projStatus.className = 'proj-status hidden';\n    }\n  }\n\n  // Reformat input value with BR thousand separators on blur (keeps it tidy)\n  function tidy(el) {\n    var n = parseBR(el.value);\n    el.value = fmt(n);\n  }\n\n  [vendasEl, metaEl, projEl].forEach(function (el) {\n    el.addEventListener('input', render);\n    el.addEventListener('blur', function () { tidy(el); render(); });\n    el.addEventListener('focus', function () { el.select(); });\n  });\n\n  render();\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
